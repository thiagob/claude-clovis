services:
  agent:
    build:
      context: https://github.com/open-clovis/open-clovis.git
    container_name: open-clovis-${BOT_NAME:-clovis}
    restart: unless-stopped
    stdin_open: true       # Claude expects a TTY-ish stdin
    tty: true              # without these the process exits immediately
    volumes:
      - ./data:/home/clovis  # home dir — holds .claude/ config and .claude.json
    environment:
      TZ: America/Sao_Paulo
      HOME: /home/clovis
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      WAHA_API_KEY: ${WAHA_API_KEY:-}
      WAHA_URL: http://waha:3000
      WAHA_SESSION: ${WAHA_SESSION:-}
    depends_on:
      n8n:
        condition: service_healthy
    networks:
      - clovis-net

  n8n:
    image: n8nio/n8n:latest
    container_name: open-clovis-n8n-${BOT_NAME:-clovis}
    restart: unless-stopped
    ports:
      - "5678:5678"
    volumes:
      - ./n8n-data:/home/node/.n8n
    environment:
      TZ: America/Sao_Paulo
      GENERIC_TIMEZONE: America/Sao_Paulo
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_SECURE_COOKIE: "false"  # required when accessing over plain HTTP
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - clovis-net

  waha:
    image: devlikeapro/waha
    container_name: open-clovis-waha-${BOT_NAME:-clovis}
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./waha-data:/app/.waha/sessions
    environment:
      WHATSAPP_API_KEY: ${WAHA_API_KEY:-}
      WAHA_DASHBOARD_USERNAME: ${WAHA_DASHBOARD_USERNAME:-}
      WAHA_DASHBOARD_PASSWORD: ${WAHA_DASHBOARD_PASSWORD:-}
      WHATSAPP_SWAGGER_USERNAME: ${WHATSAPP_SWAGGER_USERNAME:-}
      WHATSAPP_SWAGGER_PASSWORD: ${WHATSAPP_SWAGGER_PASSWORD:-}
      WAHA_APPS_ENABLED: True
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - clovis-net

networks:
  clovis-net:
    driver: bridge
